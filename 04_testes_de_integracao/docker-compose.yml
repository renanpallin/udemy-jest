# Docker Compose para subir um banco PostgreSQL de teste
#
# Como usar:
#   docker compose up -d    → sobe o container em background
#   docker compose down     → derruba e remove o container
#
# Após subir, configure a variável DATABASE_URL no arquivo .env.test:
#   DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/testdb
#
# Nota: o banco SQLite (padrão neste projeto) não precisa de Docker.
# Este docker-compose é fornecido para ilustrar a abordagem com PostgreSQL,
# que é recomendada em ambientes de produção.

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: jest-course-db-test
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Usar volume em memória para maior velocidade nos testes
    tmpfs:
      - /var/lib/postgresql/data
